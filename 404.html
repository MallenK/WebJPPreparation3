<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>JP Preparation</title>
    <script type="text/javascript">
      var repoName = "WebJPPreparation3";
      var l = window.location;
      
      // Esta línea reconstruye la URL correctamente:
      // Dominio + /NombreRepo/ + ?/ + lo que el usuario escribió
      var newPath = l.pathname.split('/').filter(Boolean);
      // Si el primer segmento no es el repo, lo ignoramos y cogemos el resto
      var pathAfterRepo = newPath[0] === repoName ? newPath.slice(1).join('/') : newPath.join('/');
      
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/' + repoName + '/?/' + pathAfterRepo +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
